overview:
  title: Overview
  description: Split the service into a low-volume write path for creating short URLs and a high-volume read path for redirects. Keep redirect latency low by caching hot mappings and sending analytics events asynchronously.
  cards:
  - title: Primary Goal
    text: Resolve short codes to long URLs with very low latency and high availability.
  - title: Scale Focus
    text: Redirect traffic dominates writes, so optimize the read path first.
  - title: Source of Truth
    text: The database owns URL mappings; cache and edge layers accelerate access.
  - title: Async Work
    text: Analytics, abuse checks, and reporting should not block redirects.
high_level_design:
  title: High Level Design
  description: The system has two main paths. The create path validates and stores mappings. The redirect path checks cache first, falls back to the database, and emits analytics asynchronously.
  components:
  - Client
  - CDN / Edge
  - Load Balancer
  - API Servers
  - Redis Cache
  - Mapping DB
  - Event Stream
  - Analytics Store
  notes:
  - Use CDN or edge caching for highly popular short links.
  - Keep API servers stateless behind the load balancer.
  - Use cache-aside for redirect lookups.
  - Emit click events to a stream after returning the redirect.
trade_offs:
  title: Trade-offs
  items:
  - choice: Short custom aliases
    benefit: Human-friendly and memorable links.
    cost: Requires reservation checks, abuse prevention, and collision handling.
  - choice: Random code generation
    benefit: Harder to enumerate.
    cost: Needs collision retries and careful entropy sizing.
  - choice: Base62 from unique IDs
    benefit: Compact, deterministic, and collision-free.
    cost: Sequential IDs can be predictable unless obscured.
  - choice: 301 redirects
    benefit: Better browser and CDN caching.
    cost: Harder to change destination later.
  - choice: Async analytics
    benefit: Keeps redirect latency low.
    cost: Counters become eventually consistent.
code:
  title: Code (Optional)
  description: A minimal create endpoint validates input, generates a code, stores the mapping, and returns the public short URL.
  language: python
  snippet: |-
    def create_short_url(long_url, custom_alias=None):
        validate_url(long_url)
        code = custom_alias or base62(generate_unique_id())

        if mapping_store.exists(code):
            raise AliasAlreadyTaken(code)

        mapping_store.put({
            "code": code,
            "long_url": long_url,
            "status": "active"
        })
        cache.delete(code)
        return f"https://sho.rt/{code}"
