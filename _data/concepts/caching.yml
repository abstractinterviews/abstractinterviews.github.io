- id: cache-patterns
  title: Cache Patterns
  description: Choose the caching pattern based on read/write behavior and consistency needs.
  subsections:
  - id: core-patterns
    title: Core Patterns
    text: ''
    items: []
    table:
    - Pattern: Cache-aside
      How It Works: App reads cache, falls back to DB, then fills cache
      Best For: Common read-heavy services
    - Pattern: Read-through
      How It Works: Cache service fetches source on miss
      Best For: Centralized cache logic
    - Pattern: Write-through
      How It Works: Write cache and DB synchronously
      Best For: Fresh cache after writes
    - Pattern: Write-back
      How It Works: Write cache first, persist later
      Best For: Fast writes with durability trade-off
