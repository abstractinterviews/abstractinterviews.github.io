  description: Caching stores frequently accessed data in a fast storage layer so future requests can be served quickly.
  benefits:
  - Reduces latency
  - Reduces database load
  - Improves scalability
  - Decreases bandwidth cost
  tradeoffs:
  - Risk of stale data
  - Cache invalidation complexity
